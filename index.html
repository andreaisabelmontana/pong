<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pong — classic arcade game</title>
  <meta name="description" content="A clean, modern take on Pong: paddle-spin physics, three CPU difficulties, first to 11." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏓</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="frame">
    <canvas id="game" width="900" height="600"></canvas>

    <div class="overlay" id="overlay">
      <h1>PONG</h1>
      <p class="sub">First to 11 wins.</p>
      <div class="diffs" id="diffs">
        <button data-diff="0.06">Casual</button>
        <button data-diff="0.10" class="sel">Standard</button>
        <button data-diff="0.16">Brutal</button>
      </div>
      <button class="play" id="play">Play</button>
      <p class="controls">Move: <b>mouse</b> / <b>↑ ↓</b> / <b>W S</b> · Pause: <b>P</b> · Mute: <b>M</b></p>
    </div>

    <div class="overlay hidden" id="endscreen">
      <h1 id="endtitle">YOU WIN</h1>
      <button class="play" id="again">Play again</button>
    </div>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
